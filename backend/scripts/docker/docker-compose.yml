    image: postgres:17.6-alpine
    restart: always
    container_name: tide-db
    ports:
      - '5432:5432'
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres@2026
      POSTGRES_DB: tide_admin
    volumes:
      - ./postgresql/data/:/var/lib/postgresql/data/
  redis:
    image: redis:8-alpine
    restart: always
    container_name: tide-redis
    ports:
      - '1379:6379'
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./redis/conf/redis.conf:/usr/local/redis/config/redis.conf
      - ./redis/data/:/data/
      - ./redis/logs/:/logs/
    command: 'redis-server /usr/local/redis/config/redis.conf --appendonly yes --requirepass redis12#'
  web:
    image: nginx:1.30-alpine
    restart: always
    container_name: tide-web
    ports:
      - '3080:80'
      - '3443:443'
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./web/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./web/logs/:/var/log/nginx/
      - ./web/html:/usr/share/nginx/html/
      - /opt/cert/:/etc/nginx/cert/
  api:
    build: tide-admin
    restart: always
    container_name: tide-admin
    ports:
      - '18000:18000'
      - '1789:1789'
    networks:
      - 1panel-network
    environment:
      TZ: Asia/Shanghai
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_USER: tide
      DB_PWD: AeMW6BafcXQT4pe2
      DB_NAME: tide
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PWD: redis_nAaBHh
      REDIS_DB: 15
      SCHEDULE_HOST: tide-schedule
      SCHEDULE_PORT: 1788
      SCHEDULE_TOKEN: SJ_Wyz3dmsdbDOkDujOTSSoBjGQP1BMsVnj
    volumes:
      - ./api/data/file/:/app/data/file/
      - ./api/logs/:/app/logs/
  schedule:
    build: tide-schedule
    restart: always
    container_name: tide-schedule
    ports:
      - '18001:18001'
      - '1788:1788'
    networks:
      - 1panel-network
    environment:
      TZ: Asia/Shanghai
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_USER: tide_job
      DB_PWD: AeMW6BafcXQT4pe2
      DB_NAME: tide_job
    volumes:
      - ./schedule/logs/:/app/logs/
networks:
  1panel-network:
    external: true