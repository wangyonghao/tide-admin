name: Backend Deploy

on:
  # 推送时执行
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  # 可手动执行
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 1.Checkout
        uses: actions/checkout@v5
      # 2. 安装 Java 环境
      - name: 2.Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 17
          cache: "maven" # 缓存 Maven 依赖，加速构建
      # 3. Maven 打包
      - name: 3.Maven Package
        run: |
          sed -i.bak '/<repositories>/,/<\/repositories>/d' ./backend/pom.xml
          sed -i.bak '/<pluginRepositories>/,/<\/pluginRepositories>/d' ./backend/pom.xml
          mvn -B package -q --file ./backend/pom.xml
      # 4. 初始化 Docker Buildx（多架构构建必备）
      - name: 4.Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # 5. 登录 DockerHub
      - name: 5.Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # 7. 构建多架构镜像并推送到 DockerHub
      - name: 6.Build & Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend/svr-admin/target/
          push: true
          platforms: linux/amd64,linux/arm64
          tags: wangyonghao/tide-admin:latest
          # 若Dockerfile不在根目录/有自定义名称，添加：
          file: ./backend/svr-admin/Dockerfile
      # # 8. 拷贝到服务器
      # - name: Copy artifacts for tide-api
      #   uses: appleboy/scp-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     port: ${{ secrets.SSH_PORT }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_KEY }}
      #     source: ./backend/svr-admin/target/app/*
      #     target: /opt/tide-admin/api/app
      #     strip_components: 3
      # - name: Copy artifacts for tide-schedule
      #   uses: appleboy/scp-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     port: ${{ secrets.SSH_PORT }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_KEY }}
      #     source: ./backend/svr-job/target/*.jar
      #     target: /opt/tide-admin/schedule/app
      #     strip_components: 2
      # - name: Copy scripts
      #   uses: appleboy/scp-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     port: ${{ secrets.SSH_PORT }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_KEY }}
      #     source: ./backend/scripts/docker/*
      #     target: /opt/tide-admin/
      #     strip_components: 2
      # 8. 远程服务器执行部署脚本
      - name: Start
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/tide-admin
            docker-compose pull && docker-compose up -d --force-recreate
